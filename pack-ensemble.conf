# Shared configuration for ensemble packaging scripts.
# Existing environment variables win over these values.

: "${IMAGE_TAG:=pcgeos-pack-ensemble:local}"

: "${GEOS_ZIP_URL:=https://github.com/bluewaysw/pcgeos/releases/download/CI-latest/pcgeos-ensemble_nc.zip}"
: "${GEOS_GERMAN_ZIP_URL:=https://github.com/bluewaysw/pcgeos/releases/download/CI-latest/pcgeos-ensemble_german.zip}"
: "${BASEBOX_ZIP_URL:=https://github.com/bluewaysw/pcgeos-basebox/releases/download/CI-latest-issue-13/pcgeos-basebox.zip}"

: "${OUTPUT_NAME:=ensemble.zip}"
: "${BASEBOX_CONSOLE_MODE:=hide}"
: "${BASEBOX_VERSION:=10}"
: "${DELETE_STAGED_ENSEMBLE_DIRS:=yes}"

# Used by direct/local pack-ensemble.sh runs.
: "${OUTPUT_DIR:=$PWD/packaged}"

# Used by docker-run.sh when passing OUTPUT_DIR into container.
: "${DOCKER_OUTPUT_DIR:=/work/packaged}"
